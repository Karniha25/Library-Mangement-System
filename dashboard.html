<!DOCTYPE html>
<html>
<head>
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📚 Library</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="books.html">Books</a>
        <a href="members.html">Members</a>
        <a href="issue.html">Issue</a>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Top Bar -->
        <div class="topbar">
            <h1>Welcome, Admin</h1>
        </div>

        <!-- Stats Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Books</h3>
                <p>120</p>
            </div>
            <div class="card">
                <h3>Members</h3>
                <p>45</p>
            </div>
            <div class="card">
                <h3>Issued</h3>
                <p>30</p>
            </div>
            <div class="card">
                <h3>Available</h3>
                <p>90</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="section">
            <h2>Quick Actions</h2>
            <div class="actions">
                <a href="books.html">Add Book</a>
                <a href="members.html">Add Member</a>
                <a href="issue.html">Issue Book</a>
            </div>
        </div>

        <!-- Activity Table -->
        <div class="section">
            <h2>Recent Activity</h2>
            <table>
                <tr>
                    <th>Member</th>
                    <th>Book</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>John</td>
                    <td>Java Basics</td>
                    <td>Issued</td>
                </tr>
                <tr>
                    <td>Ana</td>
                    <td>DBMS</td>
                    <td>Returned</td>
                </tr>
            </table>
        </div>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
