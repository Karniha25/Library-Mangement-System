<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h2>📚 Library</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="books.html" class="active">Books</a>
        <a href="members.html">Members</a>
        <a href="issue.html">Issue</a>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="main">
        <div class="topbar">
            <h1>Manage Books</h1>
        </div>

        <div class="card">
            <h3>Add New Book</h3>
            <input type="text" id="bookId" placeholder="Book ID">
            <input type="text" id="title" placeholder="Title">
            <input type="text" id="author" placeholder="Author">
            <button onclick="addBook()">Add Book</button>
        </div>

        <div class="section">
            <h3>Book List</h3>
            <table id="bookTable">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                </tr>
            </table>
        </div>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
